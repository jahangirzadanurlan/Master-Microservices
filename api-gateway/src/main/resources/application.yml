spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: person
          uri: lb://person
          predicates:
            - Path=/person/**
        - id: work
          uri: lb://work
          predicates:
            - Path=/work/**
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    gateway:
      enabled: true
  info:
    env:
      enabled: true
eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

server:
  port: 8080

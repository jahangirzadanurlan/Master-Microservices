version: '3'
services:
  eurekaserver:
    build: ../eureka-server
    image: eurekaserver-ms
    container_name: eurekaserver
    ports:
      - "8761:8761"
    extends:
      file: common-config.yml
      service:  microservice-base-config
    environment:
      SPRING_APPLICATION_NAME: "eurekaserver"

  gateway-server:
    build: ../api-gateway
    image: api-gateway-ms
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - person-service
      - work
    environment:
      SPRING_APPLICATION_NAME: "gatewayserver"
    extends:
      file: common-config.yml
      service:  microservice-gateway-config

  configserver:
    build: ../config-server
    image: configserver
    container_name: configserver-ms
    ports:
      - "8888:8888"
    depends_on:
      - db
    healthcheck:
      test: "curl --fail --silent localhost:8888/actuator/health/readiness | grep UP || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
    extends:
      file: common-config.yml
      service: microservice-base-config

  person-service:
    build: ../person
    image: person-service-ms
    container_name: person-service
    ports:
      - "8085:8085"
    environment:
      SPRING_APPLICATION_NAME: "person-service"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://db:5432/product"
    extends:
      file: common-config.yml
      service: microservice-eureka-config

  work:
    build: ../work
    image: work
    container_name: work-ms
    ports:
      - "8081:8081"
    environment:
      SPRING_APPLICATION_NAME: "work"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://db:5432/product"
    extends:
      file: common-config.yml
      service: microservice-eureka-config

  db:
    image: postgres:latest
    environment:
      - POSTGRES_DB=product
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=root
    ports:
      - "5432:5432"
    networks:
      - my_network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    extends:
      file: common-config.yml
      service: microservice-db-config

networks:
  my_network:
    driver: "bridge"

volumes:
  postgres_data:
